<svg viewBox="0 0 1200 430" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Composerdle — a daily classical-composer guessing game, on web and iOS">
  <title>Composerdle — a daily classical-composer guessing game, on web and iOS</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f0df"/>
      <stop offset="1" stop-color="#efe4cb"/>
    </linearGradient>
    <style>
      .serif { font-family: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif; }
      .sans  { font-family: ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    </style>
  </defs>

  <!-- programme card -->
  <rect x="0" y="0" width="1200" height="430" fill="url(#paper)"/>
  <rect x="18" y="18" width="1164" height="394" fill="none" stroke="#9a7724" stroke-width="2"/>
  <rect x="26" y="26" width="1148" height="378" fill="none" stroke="#c8b076" stroke-width="1"/>

  <!-- faint staff texture, left to right -->
  <g stroke="#d8c8a4" stroke-width="1.2">
    <line x1="60" y1="352" x2="1140" y2="352"/>
    <line x1="60" y1="364" x2="1140" y2="364"/>
    <line x1="60" y1="376" x2="1140" y2="376"/>
    <line x1="60" y1="388" x2="1140" y2="388"/>
  </g>

  <!-- kicker -->
  <text x="60" y="86" class="sans" font-size="21" letter-spacing="7" fill="#7c2323" font-weight="700">A DAILY CONCERT PROGRAMME · WEB &amp; iOS</text>

  <!-- title -->
  <text x="56" y="196" class="serif" font-size="118" font-weight="700" fill="#211c12" letter-spacing="1">Composerdle</text>

  <!-- tagline -->
  <text x="60" y="248" class="serif" font-size="33" fill="#4a3f28" font-style="italic">Six clues. One dead genius. No pressure.</text>

  <!-- gold rule -->
  <rect x="60" y="272" width="470" height="3" fill="#9a7724"/>

  <!-- proof line -->
  <text x="60" y="312" class="sans" font-size="22" fill="#5c5137">Wordle for classical composers — guess by <tspan fill="#211c12" font-weight="700">fun facts</tspan> or by <tspan fill="#211c12" font-weight="700">ear</tspan>.  <tspan fill="#7c2323" font-weight="700">59 composers · 118 pieces</tspan></text>

  <!-- ============ right motif: a redacted By Ear score ============ -->
  <g transform="translate(792,74)">
    <rect x="0" y="0" width="336" height="214" rx="6" fill="#fbf5e7" stroke="#9a7724" stroke-width="1.5"/>

    <!-- "name inked out" bar -->
    <rect x="20" y="20" width="220" height="30" rx="3" fill="#1b160e"/>
    <text x="130" y="41" text-anchor="middle" class="sans" font-size="15" letter-spacing="4" fill="#fbf5e7" font-weight="700">▬ COMPOSER ▬</text>
    <text x="316" y="41" text-anchor="end" class="serif" font-size="17" fill="#8a6f2f" font-style="italic">Op. ?</text>

    <!-- engraved staff + notes -->
    <g stroke="#2a2317" stroke-width="1.4">
      <line x1="20" y1="92"  x2="316" y2="92"/>
      <line x1="20" y1="104" x2="316" y2="104"/>
      <line x1="20" y1="116" x2="316" y2="116"/>
      <line x1="20" y1="128" x2="316" y2="128"/>
      <line x1="20" y1="140" x2="316" y2="140"/>
    </g>
    <g fill="#1b160e">
      <ellipse cx="70"  cy="128" rx="8.5" ry="6" transform="rotate(-20 70 128)"/>
      <rect x="77" y="98" width="2.6" height="30"/>
      <ellipse cx="120" cy="116" rx="8.5" ry="6" transform="rotate(-20 120 116)"/>
      <rect x="127" y="86" width="2.6" height="30"/>
      <ellipse cx="170" cy="104" rx="8.5" ry="6" transform="rotate(-20 170 104)"/>
      <rect x="177" y="74" width="2.6" height="30"/>
      <ellipse cx="222" cy="116" rx="8.5" ry="6" transform="rotate(-20 222 116)"/>
      <rect x="229" y="86" width="2.6" height="30"/>
      <ellipse cx="272" cy="122" rx="8.5" ry="6" transform="rotate(-20 272 122)"/>
      <rect x="279" y="92" width="2.6" height="30"/>
    </g>
    <path d="M77 98 q30 -16 50 -12 M127 86 q30 -16 50 18" fill="none" stroke="#1b160e" stroke-width="2.2"/>

    <!-- play control (the recording) -->
    <circle cx="48" cy="182" r="18" fill="#7c2323"/>
    <path d="M42 173 L62 182 L42 191 Z" fill="#fbf5e7"/>
    <text x="80" y="187" class="sans" font-size="15" fill="#5c5137">a real public-domain recording</text>
  </g>

  <!-- footer -->
  <text x="60" y="393" class="sans" font-size="15.5" letter-spacing="2" fill="#8a7c58">A FAN TRIBUTE TO TWOSET VIOLIN — PLAY AT COMPOSERDLE.ANDYPANDY.ORG</text>
</svg>
