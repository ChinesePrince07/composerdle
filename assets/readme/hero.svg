<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Composerdle</title>
  <desc id="desc">A manuscript-inspired title card showing six clues and a redacted musical score for the daily classical composer guessing game.</desc>
  <rect width="1200" height="390" rx="28" fill="#f3ead8"/>
  <path d="M0 78H1200M0 156H1200M0 234H1200M0 312H1200" stroke="#d9ccb3" stroke-width="2"/>
  <g transform="translate(60 54)" fill="#271f19">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="4" fill="#8a3c2b">DAILY CLASSICAL MUSIC GAME</text>
    <text y="92" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700">Composerdle</text>
    <text y="136" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25">Name the composer from six clues.</text>
    <text y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25">Or identify the piece by ear.</text>
    <g transform="translate(0 210)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">
      <rect width="173" height="44" rx="22" fill="#271f19"/><text x="24" y="29" fill="#f3ead8">BY FACTS</text>
      <rect x="187" width="150" height="44" rx="22" fill="#8a3c2b"/><text x="211" y="29" fill="#fff8eb">BY EAR</text>
      <text x="0" y="84" fill="#6f6254">WEB  ·  NATIVE iOS  ·  PUBLIC-DOMAIN RECORDINGS</text>
    </g>
  </g>
  <g transform="translate(770 35)">
    <rect width="370" height="320" rx="18" fill="#fffaf0" stroke="#b9aa91" stroke-width="2"/>
    <text x="28" y="38" font-family="Georgia, serif" font-size="20" fill="#8a3c2b">TODAY'S SCORE</text>
    <g stroke="#9f927d" stroke-width="2">
      <path d="M28 77H342M28 91H342M28 105H342M28 119H342M28 133H342"/>
      <path d="M28 181H342M28 195H342M28 209H342M28 223H342M28 237H342"/>
    </g>
    <g fill="#271f19">
      <ellipse cx="85" cy="112" rx="10" ry="7" transform="rotate(-18 85 112)"/><path d="M94 110V70" stroke="#271f19" stroke-width="3"/>
      <ellipse cx="144" cy="90" rx="10" ry="7" transform="rotate(-18 144 90)"/><path d="M153 88V52" stroke="#271f19" stroke-width="3"/>
      <ellipse cx="210" cy="126" rx="10" ry="7" transform="rotate(-18 210 126)"/><path d="M219 124V82" stroke="#271f19" stroke-width="3"/>
      <ellipse cx="276" cy="98" rx="10" ry="7" transform="rotate(-18 276 98)"/><path d="M285 96V58" stroke="#271f19" stroke-width="3"/>
    </g>
    <rect x="52" y="165" width="270" height="30" rx="3" fill="#271f19"/>
    <rect x="74" y="213" width="226" height="28" rx="3" fill="#271f19"/>
    <text x="185" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#8a3c2b">Who wrote it?</text>
  </g>
</svg>
