name: Publish iOS (OTA)

# Build the Composerdle SwiftUI app UNSIGNED on a macOS runner, then re-sign the
# finished .ipa with zsign (p12 + mobileprovision) — the ESign/Feather mechanism
# that keeps the app's own bundle id under one UDID-locked ad-hoc profile — and
# publish to andypandy.org/apps for OTA install. No widget/app-group to remap.

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/publish-ios.yml'
  workflow_dispatch:

concurrency:
  group: publish-ios-composerdle
  cancel-in-progress: true

jobs:
  build-sign-publish:
    runs-on: macos-15
    env:
      SCHEME: Composerdle
      SLUG: composerdle
      APP_TITLE: Composerdle
      SITE: https://www.andypandy.org
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Swift 6 / project format 77 needs Xcode 16+)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Install tooling (xcodegen + build zsign)
        run: |
          set -euo pipefail
          brew install xcodegen openssl@3 pkg-config
          git clone --depth 1 https://github.com/zhlynn/zsign.git "$RUNNER_TEMP/zsign"
          export PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig"
          make -C "$RUNNER_TEMP/zsign/build/macos"
          ZSIGN="$RUNNER_TEMP/zsign/bin/zsign"
          test -x "$ZSIGN"
          echo "ZSIGN=$ZSIGN" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build UNSIGNED .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          ARCHIVE="$RUNNER_TEMP/app.xcarchive"
          xcodebuild archive \
            -project Composerdle.xcodeproj -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

          APP="$(ls -d "$ARCHIVE/Products/Applications/"*.app | head -1)"
          rm -rf "$RUNNER_TEMP/Payload"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          (cd "$RUNNER_TEMP" && zip -qry unsigned.ipa Payload)

          INFO="$APP/Info.plist"
          {
            echo "UNSIGNED_IPA=$RUNNER_TEMP/unsigned.ipa"
            echo "BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$INFO")"
            echo "APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$INFO")"
            echo "APP_BUILD=$(/usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$INFO")"
          } >> "$GITHUB_ENV"

          ICON_SRC="$(find . -path '*AppIcon.appiconset/*.png' -type f -exec stat -f '%z %N' {} \; | sort -rn | head -1 | cut -d' ' -f2-)"
          if [[ -n "$ICON_SRC" && -f "$ICON_SRC" ]]; then
            sips -Z 512 "$ICON_SRC" --out "$RUNNER_TEMP/icon.png" >/dev/null
            echo "HAS_ICON=true" >> "$GITHUB_ENV"
          else
            echo "HAS_ICON=false" >> "$GITHUB_ENV"
          fi

      - name: Sign with zsign (p12 + mobileprovision)
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          echo "$IOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$RUNNER_TEMP/pp.mobileprovision"
          "$ZSIGN" -k "$RUNNER_TEMP/cert.p12" -p "$IOS_P12_PASSWORD" \
            -m "$RUNNER_TEMP/pp.mobileprovision" \
            -o "$RUNNER_TEMP/signed.ipa" "$UNSIGNED_IPA"
          {
            echo "IPA=$RUNNER_TEMP/signed.ipa"
            echo "IPA_SIZE=$(stat -f%z "$RUNNER_TEMP/signed.ipa")"
          } >> "$GITHUB_ENV"
          echo "Signed $BUNDLE_ID v$APP_VERSION ($APP_BUILD)"

      - name: Publish to andypandy.org/apps
        env:
          IOS_UPLOAD_TOKEN: ${{ secrets.IOS_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail
          PRESIGN_BODY="$(SLUG="$SLUG" HAS_ICON="$HAS_ICON" python3 -c '
          import json, os
          has = os.environ["HAS_ICON"] == "true"
          print(json.dumps({"slug": os.environ["SLUG"], "ipaContentType": "application/octet-stream",
                            "iconContentType": "image/png" if has else None}))')"
          PRESIGN="$(curl -fsSL -X POST "$SITE/api/admin/ios/upload" \
            -H "Authorization: Bearer $IOS_UPLOAD_TOKEN" -H 'Content-Type: application/json' \
            -d "$PRESIGN_BODY")"
          IPA_URL="$(echo "$PRESIGN" | python3 -c 'import sys,json; print(json.load(sys.stdin)["ipaUploadUrl"])')"
          ICON_URL="$(echo "$PRESIGN" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("iconUploadUrl") or "")')"

          curl -fsS -X PUT "$IPA_URL" -H 'Content-Type: application/octet-stream' --data-binary @"$IPA" >/dev/null
          if [[ "$HAS_ICON" == "true" && -n "$ICON_URL" ]]; then
            curl -fsS -X PUT "$ICON_URL" -H 'Content-Type: image/png' --data-binary @"$RUNNER_TEMP/icon.png" >/dev/null
          fi

          REGISTER_BODY="$(SLUG="$SLUG" APP_TITLE="$APP_TITLE" BUNDLE_ID="$BUNDLE_ID" APP_VERSION="$APP_VERSION" APP_BUILD="$APP_BUILD" IPA_SIZE="$IPA_SIZE" HAS_ICON="$HAS_ICON" python3 -c '
          import json, os
          print(json.dumps({"slug": os.environ["SLUG"], "appName": os.environ["APP_TITLE"],
              "bundleId": os.environ["BUNDLE_ID"], "version": os.environ["APP_VERSION"],
              "build": os.environ["APP_BUILD"], "sizeBytes": int(os.environ["IPA_SIZE"]),
              "hasIcon": os.environ["HAS_ICON"] == "true"}))')"
          RESP="$(curl -fsSL -X POST "$SITE/api/admin/ios/register" \
            -H "Authorization: Bearer $IOS_UPLOAD_TOKEN" -H 'Content-Type: application/json' \
            -d "$REGISTER_BODY")" || { echo "Register failed: $RESP"; exit 1; }
          echo "Published: $RESP — install at $SITE/apps"
